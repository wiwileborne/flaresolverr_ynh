#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "flaresolverr"
name = "FlareSolverr"
description.en = "Proxy server to bypass Cloudflare protection"
description.fr = "Serveur proxy pour contourner la protection de Cloudflare"

version = "3.4.6~ynh1"

maintainers = ["Wiwileborne"]

[upstream]
license = "MIT"
code = "https://github.com/FlareSolverr/FlareSolverr"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = ["amd64"]
multi_instance = true

ldap = "not_relevant"
sso = "not_relevant"

disk = "300M"
ram.build = "200M"
ram.runtime = "512M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/flaresolverr"

    [install.init_main_permission]
    type = "group"
    default = "admins"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["fr_FR", "en_GB"]
    default = "fr_FR"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/FlareSolverr/FlareSolverr/releases/download/v3.4.6/flaresolverr_linux_x64.tar.gz"
    amd64.sha256 = "0f985ddaab0e3d64bf122b9afd3c419ec3f83eed8cb0f36875c95d9cc450df73"
    in_subdir = 2

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset = "flaresolverr_linux_x64.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
